services:
  - type: web
    name: gameon-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build && npm run prisma:migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
